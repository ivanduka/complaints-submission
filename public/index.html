<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
      integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T"
      crossorigin="anonymous"
    />
    <script
      src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
      integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
      integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
      integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
      crossorigin="anonymous"
    ></script>
    <title>Complaint Submission Form (Beta version)</title>
  </head>

  <body>
    <div class="container my-3 py-3">
      <div class="row">
        <div class="col-sm"></div>
        <div class="col-sm border border-primary rounded pb-3">
          <h1>Complaint Submission Form (beta version)</h1>
          <form action="/" method="POST" enctype="multipart/form-data">
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" name="name" class="form-control" id="name" placeholder="Name" />
            </div>

            <div class="form-group">
              <label for="name">Surname</label>
              <input
                type="text"
                class="form-control"
                name="surname"
                id="name"
                placeholder="Surname"
              />
            </div>

            <div class="form-group">
              <label for="email">Email address</label>
              <input
                type="email"
                class="form-control"
                name="email"
                id="email"
                placeholder="name@example.com"
              />
            </div>

            <div class="form-group">
              <label for="phone">Phone (only ten digits)</label>
              <input
                type="phone"
                class="form-control"
                name="phone"
                id="phone"
                placeholder="1234567890"
              />
            </div>

            <div class="form-group">
              <label for="postalCode">Postal Code</label>
              <input
                type="text"
                class="form-control"
                name="postalCode"
                id="postalCode"
                placeholder="T2S 0H2"
              />
            </div>

            <div class="form-group">
              <label for="details">Complaint details</label>
              <textarea
                class="form-control"
                id="details"
                rows="3"
                name="details"
                placeholder="Please enter the details of your complaint"
              ></textarea>
            </div>

            <div class="form-group">
              <label>Please choose the type of complaint</label>
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  name="submitterType"
                  id="submitterType1"
                  value="General Complaint / Not sure"
                  checked
                />
                <label class="form-check-label" for="submitterType1">
                  General Complaint / Not sure
                </label>
              </div>

              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  name="submitterType"
                  id="submitterType2"
                  value="Complaint against Canadian Energy Regulator"
                />
                <label class="form-check-label" for="submitterType2">
                  Complaint against the Canadian Energy Regulator
                </label>
              </div>

              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  name="submitterType"
                  id="submitterType3"
                  value="Complaint against a private company"
                />
                <label class="form-check-label" for="submitterType3">
                  Complaint against a private company
                </label>
              </div>
            </div>

            <div class="form-group">
              <label for="file">Upload your supporting document</label>
              <input type="file" name="file" class="form-control-file" id="file" />
            </div>

            <button type="submit" class="btn btn-primary">Submit the complaint</button>
          </form>
        </div>
        <div class="col-sm"></div>
      </div>
    </div>
  </body>
</html>
